syntax = "proto3";

package pb;

message Matrix {
  repeated int32 a = 1; // n0 x n1 matrix in field F_p. length is n0 * n1.
  string text = 2; // e.g. "[100,010,001]".
}

message FlattenMatrixProof {
}

message ForcedProductProof {
  uint32 projection_type = 1; // in 0,1,2
}

message Transformation {
  bool transpose = 1;
  fixed32 gl_left = 2;
  fixed32 gl_right = 3;
}

message DegenerateProof {
  fixed32 extra_restriction = 1;
  Transformation transformation = 2;
  // uint32 reduced_rmm_index = 3;
}

message BacktrackingProof {
  uint32 proof_size = 1;
}

message RankLowerBoundProof {
  oneof proof {
    FlattenMatrixProof flatten_matrix_proof = 1;
    ForcedProductProof forced_product_proof = 2;
    DegenerateProof degenerate_proof = 3;
    BacktrackingProof backtracking_proof = 4;
  }
}

message RestrictedMM {
  uint32 index = 1;
  bytes compact_restrictions = 2;
  string restrictions_text = 3; // for human readability; never read. e.g. "[00,01],[01,10]".
  string tensor = 4; // for human readability; never read
  optional int32 rank_lower_bound = 5;
  RankLowerBoundProof rank_lower_bound_proof = 6;
  optional int32 rank_upper_bound = 7;
  string rank_upper_bound_proof = 8;
}

message RestrictedMMCollection {
  int32 n0 = 1;
  int32 n1 = 2;
  int32 n2 = 3;
  int32 p = 4; // in field F_p
  repeated RestrictedMM restricted_mm = 5;
}
